<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dante🩷</title>

<!-- خط كيوت للاسم -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:'Playfair Display', serif;
  color:white;
}

/* اسم Dante🩷 */
.name{
  position:absolute;
  font-family:'Pacifico', cursive;
  font-size:46px;
  opacity:0;
  color:white;
  text-shadow:0 0 25px rgba(255,182,193,.8);
  animation: nameMove 7s ease forwards;
}

@keyframes nameMove{
  0%{opacity:0;transform:translateY(30px) scale(.9);}
  20%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;transform:translateY(-30px) scale(1);}
}

/* الصور (أكبر وأطول) */
.photo{
  position:absolute;
  width:190px;
  border-radius:16px;
  opacity:0;
  animation: photoShow 8s ease forwards;
  box-shadow:0 0 30px rgba(255,255,255,.3);
}

@keyframes photoShow{
  0%{opacity:0;transform:scale(.9);}
  20%{opacity:1;}
  85%{opacity:1;}
  100%{opacity:0;transform:scale(1);}
}

/* ايموجيز */
.emoji{
  position:absolute;
  font-size:22px;
  animation: float 4.5s ease forwards;
}

@keyframes float{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-160px);opacity:0;}
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop autoplay></audio>

<script>
/* تشغيل الصوت (iOS) */
document.body.addEventListener("touchstart",()=>{
  const m=document.getElementById("music");
  if(m.paused) m.play();
},{once:true});

/* الصور بتوازن */
const photos=["p1.JPG","p2.JPG","p3.JPG","p4.DNG","p5.JPG","p6.JPG","p7.JPG","p8.JPG","p9.JPG","p10.JPG","p11.JPG","p12.JPG","p13.JPG","p14.JPG"];

let photoIndex=0;

function spawnPhoto(){
  const img=document.createElement("img");
  img.src=photos[photoIndex];
  photoIndex=(photoIndex+1)%photos.length;

  img.className="photo";
  img.style.left=Math.random()*60+"%";
  img.style.top=Math.random()*60+"%";
  document.body.appendChild(img);

  setTimeout(()=>img.remove(),8000);
}
setInterval(spawnPhoto,2000);

/* اسم Dante🩷 */
function spawnName(){
  const n=document.createElement("div");
  n.className="name";
  n.innerText="Dante🩷";
  n.style.left=Math.random()*65+"%";
  n.style.top=Math.random()*65+"%";
  document.body.appendChild(n);

  setTimeout(()=>n.remove(),7000);
}
setInterval(spawnName,2600);

/* ايموجيز */
const emojis=["🩷","✨","💖","⭐","💫"];

document.addEventListener("touchstart",(e)=>{
  for(let i=0;i<4;i++){
    const em=document.createElement("div");
    em.className="emoji";
    em.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    em.style.left=(e.touches[0].clientX+Math.random()*30)+"px";
    em.style.top=(e.touches[0].clientY)+"px";
    document.body.appendChild(em);
    setTimeout(()=>em.remove(),4500);
  }
});
</script>

</body>
</html>
