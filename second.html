<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Playfair Display', serif;
}

/* الخلفية */
body{
    background:url("bg.GIF") center/cover no-repeat fixed;
    position:relative;
    opacity:1;
    transition:opacity .8s ease;
}

/* تعتيم خفيف */
body::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:0;
}

/* النص الثابت */
#mainText{
    position:absolute;
    z-index:2;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    text-align:center;
    color:white;
    font-size:18px;
    line-height:1.7;
    text-shadow:0 0 18px rgba(255,255,255,.35);
}

/* الجمل العشوائية */
.floating{
    position:absolute;
    z-index:2;
    color:white;
    font-size:14px;
    opacity:0;
    animation: appear 6s ease forwards;
    text-shadow:0 0 12px rgba(255,255,255,.4);
}

@keyframes appear{
    0%{opacity:0;transform:scale(.95);}
    15%{opacity:1;}
    75%{opacity:1;}
    100%{opacity:0;}
}

/* الايموجيز */
.emoji{
    position:absolute;
    z-index:3;
    font-size:22px;
    animation: fall 4s ease forwards;
}

@keyframes fall{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(220px);opacity:0;}
}

/* زر الانتقال */
#next{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
    padding:12px 26px;
    background:transparent;
    border:1px solid white;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:.4s;
}

#next:hover{
    background:white;
    color:black;
}

/* اختفاء للانتقال */
.fadeOut{
    opacity:0;
}
</style>
</head>

<body>

<div id="mainText">
She walks in beauty, like the night
Of cloudless climes and starry skies;
And all that’s best of dark and bright
Meet in her aspect and her eyes;
Thus mellowed to that tender light
Which heaven to gaudy day denies
    happy birthday❤️
</div>

<button id="next">Continue ✨</button>

<audio id="music" src="song.mp3" loop></audio>

<script>
/* تشغيل الموسيقى (iOS) */
document.body.addEventListener("touchstart",()=>{
    const m=document.getElementById("music");
    if(m.paused) m.play();
},{once:true});

/* الجمل */
const lines=[
"Happy birthday love",
"i love you❤️",
"You deserve all the happiness in the world",
"Every time you move you look like you're dancing🌸",
"The way you move is poetry untamed🎀",
"Every step you take the stars are framed✨",
"a universe between you and i💞",
    
];

function spawnLine(){
    const t=document.createElement("div");
    t.className="floating";
    t.innerText=lines[Math.floor(Math.random()*lines.length)];
    t.style.left=Math.random()*70+"%";
    t.style.top=Math.random()*70+"%";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),6000);
}
setInterval(spawnLine,2500);

/* ايموجيز */
const emojis=["✨","💖","⭐","🌙","💫","🫶","🌸"];

document.addEventListener("touchstart",(e)=>{
    for(let i=0;i<3;i++){
        let em=document.createElement("div");
        em.className="emoji";
        em.innerText=emojis[Math.floor(Math.random()*emojis.length)];
        em.style.left=(e.touches[0].clientX+Math.random()*30)+"px";
        em.style.top=(e.touches[0].clientY)+"px";
        document.body.appendChild(em);
        setTimeout(()=>em.remove(),4000);
    }
});

/* الانتقال للصفحة الثالثة */
document.getElementById("next").onclick=()=>{
    document.body.classList.add("fadeOut");
    setTimeout(()=>{
        window.location.href="third.html";
    },800);
};
</script>

</body>
</html>
